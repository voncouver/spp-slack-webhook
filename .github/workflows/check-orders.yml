name: Check SPP Orders

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-orders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check emails and post to Slack
        env:
          ZOHO_EMAIL: ${{ secrets.ZOHO_EMAIL }}
          ZOHO_APP_PASSWORD: ${{ secrets.ZOHO_APP_PASSWORD }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python email_to_slack.py
      - name: Save processed orders
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add processed_orders.json
          git diff --cached --quiet || git commit -m "Update processed orders"
          git push
